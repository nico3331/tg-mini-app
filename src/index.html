<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Tax Calculator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="wrap">
        <div class="logo">Tax<span>Calc</span></div>
        <div class="sub">Калькулятор комиссии аукциона</div>
        
        <div class="card">
            <div class="field-label">Сумма лота</div>
            <div class="row">
                <div class="amount-wrap">
                    <span class="currency">₽</span>
                    <input id="number" type="number" placeholder="100 000" min="0" />
                </div>
                <button onclick="Calc()" class="btn">Рассчитать</button>
            </div>
            
        <div class="result">
            <p>Результат после вычета комиссии: <span id="resultat"></span></p>
            <button class="copy-btn" onclick="Copy()" title="Скопировать">
                <svg xmlns="http://www.w3.org" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
            </button>
        </div>

        </div>
    </div>

    <script src="script.js"></script>

    <script>
        // Инициализируем Telegram
        const tg = window.Telegram.WebApp;
        
        // Разворачиваем окно приложения на всю высоту
        tg.expand();

        // Сообщаем Telegram, что приложение готово к показу
        tg.ready();
    </script>
</body>
</html>
